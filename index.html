<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#8B2252">
  <title>晚餐邀约 🌹</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose-deep: #8B2252;
      --rose: #C76B8A;
      --rose-light: #F2D0D9;
      --cream: #FFF8F0;
      --gold: #C9A96E;
      --gold-light: #E8D5B0;
      --ink: #3A2028;
      --ink-soft: #6B4C54;
      --glass: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(201, 169, 110, 0.3);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Georgia', 'Times New Roman', 'Songti SC', serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      padding: 20px;
      padding: 20px env(safe-area-inset-right) 20px env(safe-area-inset-left);
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    /* ===== Falling petals ===== */
    @media (prefers-reduced-motion: no-preference) {
      .petal {
        position: fixed;
        top: -60px;
        pointer-events: none;
        z-index: 100;
        animation: fall linear infinite;
      }
      @keyframes fall {
        0% { transform: translateY(-60px) rotate(0deg) translateX(0); opacity: 1; }
        50% { transform: translateY(50vh) rotate(180deg) translateX(40px); opacity: 0.8; }
        100% { transform: translateY(110vh) rotate(360deg) translateX(-20px); opacity: 0; }
      }
      .glow { animation: glow-pulse 4s ease-in-out infinite alternate; }
      @keyframes glow-pulse {
        0% { box-shadow: 0 0 60px rgba(201,169,110,0.15), 0 0 120px rgba(199,107,138,0.08); }
        100% { box-shadow: 0 0 80px rgba(201,169,110,0.25), 0 0 160px rgba(199,107,138,0.12); }
      }
      .fade-up {
        opacity: 0; transform: translateY(30px);
        animation: fade-up 0.8s ease forwards;
      }
      @keyframes fade-up { to { opacity: 1; transform: translateY(0); } }
      .heart-float { animation: heart-bob 3s ease-in-out infinite; }
      @keyframes heart-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      .slide-in {
        opacity: 0; transform: translateY(40px);
        transition: opacity 0.6s ease, transform 0.6s ease;
      }
      .slide-in.visible { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .petal { display: none; }
      .fade-up, .slide-in { opacity: 1; transform: none; }
      .heart-float { animation: none; }
    }

    /* ===== Bullet screen ===== */
    .bullet-container {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 100vh;
      pointer-events: none;
      z-index: 99;
      overflow: hidden;
    }
    .bullet {
      position: absolute;
      white-space: nowrap;
      font-size: 15px;
      color: var(--rose-deep);
      background: rgba(255,248,240,0.85);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--rose-light);
      animation: bullet-fly linear forwards;
      pointer-events: none;
    }
    @keyframes bullet-fly {
      0% { transform: translateX(100vw); opacity: 1; }
      100% { transform: translateX(-100%); opacity: 0; }
    }

    /* ===== Sections ===== */
    .invitation {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 48px 36px;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .card::before, .card::after {
      content: '';
      position: absolute; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .card::before { top: 0; }
    .card::after { bottom: 0; }

    .section-tag {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .ornament {
      font-size: 14px;
      letter-spacing: 6px;
      color: var(--gold);
      margin-bottom: 20px;
    }
    .eyebrow {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 12px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 400;
      color: var(--rose-deep);
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 18px;
      color: var(--ink-soft);
      font-style: italic;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .divider {
      width: 60px; height: 1px;
      background: var(--gold);
      margin: 24px auto;
      position: relative;
    }
    .divider::before {
      content: '';
      position: absolute; top: -3px; left: 50%;
      transform: translateX(-50%);
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
    }

    /* ===== Detail grid ===== */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin: 24px 0;
    }
    .detail-label {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--rose); margin-bottom: 6px;
    }
    .detail-value {
      font-size: 17px; color: var(--ink); line-height: 1.5;
    }

    /* ===== Countdown ===== */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 20px 0;
    }
    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .countdown-num {
      font-size: 36px;
      font-weight: 400;
      color: var(--rose-deep);
      line-height: 1;
      min-width: 50px;
    }
    .countdown-label {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--ink-soft);
      margin-top: 4px;
    }
    .countdown-colon {
      font-size: 32px;
      color: var(--gold);
      align-self: flex-start;
      margin-top: 2px;
    }

    /* ===== RSVP Form ===== */
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }
    .form-label {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 6px;
      display: block;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--rose-light);
      border-radius: 12px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.3s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--gold);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238B2252' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
      cursor: pointer;
    }

    .btn {
      display: inline-block;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 16px;
      padding: 14px 44px;
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      letter-spacing: 1px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,34,82,0.3); }
    .btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
    }
    .btn-outline {
      background: transparent;
      color: var(--rose-deep);
      border: 2px solid var(--rose);
    }
    .btn-outline:hover {
      background: var(--rose-deep);
      color: white;
    }

    /* ===== Food vote ===== */
    .food-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }
    .food-card {
      padding: 16px 12px;
      background: rgba(255,255,255,0.5);
      border: 2px solid transparent;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .food-card:hover { border-color: var(--rose-light); transform: translateY(-2px); }
    .food-card.selected { border-color: var(--rose-deep); background: rgba(139,34,82,0.08); }
    .food-card .food-emoji { font-size: 32px; margin-bottom: 6px; display: block; }
    .food-card .food-name { font-size: 14px; color: var(--ink); }
    .food-card .food-votes {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 11px; color: var(--rose);
      margin-top: 4px;
    }
    .vote-bar {
      height: 4px;
      background: var(--rose-light);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .vote-bar-fill {
      height: 100%;
      background: var(--rose-deep);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ===== Guest list ===== */
    .guest-list {
      text-align: left;
      margin: 16px 0;
    }
    .guest-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--rose-light);
    }
    .guest-item:last-child { border-bottom: none; }
    .guest-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose), var(--rose-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: white;
      font-weight: 600;
      flex-shrink: 0;
    }
    .guest-info { flex: 1; }
    .guest-name { font-size: 15px; font-weight: 600; color: var(--ink); }
    .guest-meta {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px; color: var(--ink-soft);
    }
    .guest-status {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
    }
    .status-yes { background: rgba(76,175,80,0.12); color: #2e7d32; }
    .status-maybe { background: rgba(255,152,0,0.12); color: #e65100; }
    .status-checked { background: rgba(139,34,82,0.12); color: var(--rose-deep); }

    /* ===== Chat ===== */
    .chat-box {
      max-height: 300px;
      overflow-y: auto;
      text-align: left;
      margin: 16px 0;
      padding: 0 4px;
    }
    .chat-msg {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      animation: fade-up 0.4s ease;
    }
    .chat-bubble {
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--rose-light);
      border-radius: 16px 16px 16px 4px;
      padding: 10px 14px;
      max-width: 80%;
    }
    .chat-name {
      font-size: 12px; font-weight: 600;
      color: var(--rose-deep);
      margin-bottom: 2px;
    }
    .chat-text { font-size: 14px; color: var(--ink); line-height: 1.5; }
    .chat-time {
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      font-size: 10px; color: var(--ink-soft);
      margin-top: 2px;
    }

    /* ===== Check-in ===== */
    .checkin-map {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, var(--rose-light) 0%, rgba(255,248,240,0.8) 100%);
      border-radius: 16px;
      margin: 16px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .checkin-map::before {
      content: '';
      position: absolute;
      width: 200%; height: 200%;
      background:
        radial-gradient(circle at 30% 40%, rgba(201,169,110,0.1) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(199,107,138,0.1) 0%, transparent 50%);
    }
    .checkin-pin {
      font-size: 48px;
      z-index: 1;
      animation: heart-bob 2s ease-in-out infinite;
    }
    .checkin-result {
      margin-top: 16px;
      padding: 16px;
      background: rgba(139,34,82,0.06);
      border-radius: 12px;
      font-size: 14px;
      color: var(--ink);
      display: none;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--ink);
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 14px;
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 24px 0;
      font-size: 14px;
      color: var(--ink-soft);
    }
    .footer a {
      color: var(--rose);
      text-decoration: none;
    }

    /* ===== Mobile ===== */
    @media (max-width: 480px) {
      body { padding: 12px; }
      .card { padding: 28px 16px; border-radius: 20px; }
      .detail-grid { grid-template-columns: 1fr; gap: 16px; }
      .countdown { gap: 8px; }
      .countdown-num { font-size: 26px; min-width: 36px; }
      .countdown-colon { font-size: 24px; margin-top: 4px; }
      .food-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .food-card { padding: 12px 8px; }
      .food-card .food-emoji { font-size: 28px; }
      .food-card .food-name { font-size: 13px; }
      h1 { font-size: 26px; }
      .subtitle { font-size: 15px; }
      .btn { padding: 12px 32px; font-size: 15px; width: 100%; }
      .form-input, .form-select, .form-textarea { font-size: 16px; padding: 14px 16px; }
      .mood-grid { gap: 8px; }
      .mood-item { font-size: 28px; padding: 6px; }
      .wheel-wrapper, .wheel { width: 180px; height: 180px; }
      .wheel-segment { font-size: 20px; }
      .chat-box { max-height: 250px; }
      .chat-bubble { max-width: 85%; padding: 8px 12px; }
      .guest-item { padding: 10px 0; gap: 10px; }
      .guest-avatar { width: 32px; height: 32px; font-size: 13px; }
      .guest-name { font-size: 14px; }
      .guest-meta { font-size: 11px; }
      .checkin-map { height: 140px; }
      .fun-fact { padding: 14px; font-size: 13px; }
      .section-tag { font-size: 10px; letter-spacing: 2px; }
      
      /* Mobile music player */
      .music-player { bottom: 16px; right: 16px; }
      .music-panel { 
        position: fixed;
        bottom: 80px;
        right: 16px;
        width: calc(100vw - 32px);
        max-width: 280px;
      }
      .music-toggle { width: 48px; height: 48px; font-size: 20px; }
      
      /* Better touch targets */
      .music-btn { padding: 8px; min-width: 44px; min-height: 44px; }
      .music-btn.play-btn { width: 48px; height: 48px; }
      
      /* Fix overflow */
      .bullet { font-size: 13px; padding: 5px 12px; }
      
      /* Toast mobile */
      .toast { 
        bottom: 80px; 
        max-width: 90vw; 
        white-space: normal;
        text-align: center;
        font-size: 13px;
        padding: 12px 20px;
      }
    }

    @media (max-width: 360px) {
      .card { padding: 24px 14px; }
      h1 { font-size: 24px; }
      .detail-grid { gap: 12px; }
      .food-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
      .countdown-num { font-size: 22px; min-width: 32px; }
    }

    /* ===== Confetti ===== */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      z-index: 1000;
      pointer-events: none;
      animation: confetti-fall 3s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scale(0); opacity: 0; }
    }

    /* ===== Lucky wheel ===== */
    .wheel-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 20px 0;
    }
    .wheel-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
    }
    .wheel {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 4px solid var(--gold);
      position: relative;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      overflow: hidden;
    }
    .wheel-segment {
      position: absolute;
      width: 50%;
      height: 50%;
      left: 50%;
      top: 50%;
      transform-origin: 0% 0%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .wheel-pointer {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      z-index: 10;
    }
    .wheel-result {
      margin-top: 16px;
      padding: 12px 24px;
      background: rgba(139,34,82,0.08);
      border-radius: 20px;
      font-size: 16px;
      color: var(--rose-deep);
      display: none;
    }

    /* ===== Mood selector ===== */
    .mood-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    .mood-item {
      font-size: 32px;
      cursor: pointer;
      transition: transform 0.2s;
      padding: 8px;
      border-radius: 12px;
    }
    .mood-item:hover { transform: scale(1.3); }
    .mood-item.selected {
      background: rgba(139,34,82,0.1);
      transform: scale(1.2);
    }

    /* ===== Rainbow effect ===== */
    .rainbow {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 998;
      opacity: 0;
      background: linear-gradient(45deg,
        rgba(255,0,0,0.1),
        rgba(255,127,0,0.1),
        rgba(255,255,0,0.1),
        rgba(0,255,0,0.1),
        rgba(0,0,255,0.1),
        rgba(75,0,130,0.1),
        rgba(148,0,211,0.1)
      );
      transition: opacity 0.5s;
    }
    .rainbow.show { opacity: 1; animation: rainbow-shift 2s ease; }
    @keyframes rainbow-shift {
      0%,100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* ===== Easter egg ===== */
    .title-clicks {
      cursor: default;
      user-select: none;
    }

    /* ===== Fun facts ===== */
    .fun-fact {
      padding: 16px;
      background: linear-gradient(135deg, rgba(201,169,110,0.1), rgba(199,107,138,0.1));
      border-radius: 16px;
      margin-top: 16px;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
    }
    .fun-fact-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    /* ===== Music player ===== */
    .music-player {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 997;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }
    .music-panel {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 16px;
      width: 260px;
      display: none;
      box-shadow: 0 8px 32px rgba(139,34,82,0.15);
    }
    .music-panel.show { display: block; animation: fade-up 0.3s ease; }
    .music-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--rose-deep);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .music-progress {
      width: 100%;
      height: 4px;
      background: var(--rose-light);
      border-radius: 2px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
    }
    .music-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rose-deep), var(--rose));
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }
    .music-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .music-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--ink-soft);
      transition: transform 0.2s, color 0.2s;
      padding: 4px;
    }
    .music-btn:hover { transform: scale(1.2); color: var(--rose-deep); }
    .music-btn.play-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }
    .music-btn.play-btn:hover { transform: scale(1.1); }
    .music-info {
      font-size: 11px;
      color: var(--ink-soft);
      text-align: center;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .music-toggle {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--rose-deep), var(--rose));
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
      box-shadow: 0 4px 20px rgba(139,34,82,0.3);
      transition: transform 0.3s, box-shadow 0.3s;
      animation: heart-bob 3s ease-in-out infinite;
    }
    .music-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(139,34,82,0.4);
    }
    .music-toggle.playing {
      animation: pulse-glow 1.5s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 4px 20px rgba(139,34,82,0.3); }
      50% { box-shadow: 0 4px 30px rgba(139,34,82,0.5), 0 0 40px rgba(201,169,110,0.3); }
    }
    .music-visualizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
      margin-top: 12px;
      justify-content: center;
    }
    .music-bar {
      width: 4px;
      background: linear-gradient(to top, var(--rose-deep), var(--rose));
      border-radius: 2px;
      animation: music-dance 0.8s ease-in-out infinite alternate;
    }
    .music-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
    .music-bar:nth-child(2) { animation-delay: 0.1s; height: 14px; }
    .music-bar:nth-child(3) { animation-delay: 0.2s; height: 10px; }
    .music-bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
    .music-bar:nth-child(5) { animation-delay: 0.15s; height: 12px; }
    @keyframes music-dance {
      0% { transform: scaleY(0.5); }
      100% { transform: scaleY(1.2); }
    }
    .music-visualizer.paused .music-bar {
      animation-play-state: paused;
    }

    /* ===== Touch device optimizations ===== */
    @media (hover: none) and (pointer: coarse) {
      .food-card:hover { transform: none; border-color: transparent; }
      .food-card:active { transform: scale(0.97); border-color: var(--rose-light); }
      .btn:hover { transform: none; }
      .btn:active { transform: scale(0.97); }
      .mood-item:hover { transform: none; }
      .mood-item:active { transform: scale(1.1); }
      .music-btn:hover { transform: none; }
      .music-btn:active { transform: scale(0.9); }
      .music-toggle:hover { transform: none; }
      .music-toggle:active { transform: scale(0.95); }
    }

    /* ===== Safe area for notched phones ===== */
    .music-player {
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ===== Music playlist ===== */
    .music-playlist {
      margin-top: 12px;
      border-top: 1px solid var(--rose-light);
      padding-top: 12px;
      max-height: 150px;
      overflow-y: auto;
    }
    .music-playlist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 13px;
      color: var(--ink);
    }
    .music-playlist-item:hover {
      background: rgba(139,34,82,0.08);
    }
    .music-playlist-item.active {
      background: rgba(139,34,82,0.12);
      color: var(--rose-deep);
      font-weight: 600;
    }
    .music-playlist-item .item-num {
      width: 20px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 12px;
    }
    .music-playlist-item.active .item-num {
      color: var(--rose-deep);
    }
    .music-playlist-item .item-playing {
      display: none;
      width: 20px;
      text-align: center;
    }
    .music-playlist-item.active.playing .item-num {
      display: none;
    }
    .music-playlist-item.active.playing .item-playing {
      display: block;
      animation: pulse 1s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ===== NetEase player ===== */
    .netease-player {
      margin-top: 12px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0,0,0,0.05);
    }
    .music-playlist-item {
      display: flex;
      align-items: center;

      padding: 10px 12px;

    }

    }
    .music-playlist-item .item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
</head>

<script>
// ===== Config =====
const EVENT_DATE = new Date('2025-07-26T18:30:00');

// ===== Data store (localStorage) =====
const DB_KEY = 'dinner_invite_db';
function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || defaultDB(); }
  catch { return defaultDB(); }
}
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function defaultDB() {
  return {
    guests: [],
    foods: [
      { id: 'hotpot', emoji: '🍲', name: '火锅', votes: 3 },
      { id: 'japanese', emoji: '🍣', name: '日料', votes: 5 },
      { id: 'bbq', emoji: '🥩', name: '烤肉', votes: 4 },
      { id: 'italian', emoji: '🍝', name: '西餐', votes: 2 },
      { id: 'seafood', emoji: '🦐', name: '海鲜', votes: 6 },
      { id: 'homecook', emoji: '🥘', name: '家常菜', votes: 1 },
    ],
    chat: [
      { name: '小美', text: '太期待了！好久没聚了', time: '昨天' },
      { name: '阿杰', text: '我要带酒来！', time: '2小时前' },
    ],
    checkins: [],
    bulletMsgs: ['好久不见！', '想死你们了', '必到！', '带好吃的来', '有没有酒？', '哈哈哈', '冲冲冲'],
  };
}

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== Countdown =====
function updateCountdown() {
  const now = new Date();
  let diff = EVENT_DATE - now;
  if (diff < 0) diff = 0;
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-days').textContent = d;
  document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
  document.getElementById('cd-mins').textContent = String(m).padStart(2, '0');
  document.getElementById('cd-secs').textContent = String(s).padStart(2, '0');
}
updateCountdown();
setInterval(updateCountdown, 1000);

// ===== RSVP =====
function submitRSVP() {
  const name = document.getElementById('guestName').value.trim();
  const count = document.getElementById('guestCount').value;
  const contact = document.getElementById('guestContact').value.trim();
  const msg = document.getElementById('guestMsg').value.trim();
  if (!name) { showToast('请填写你的名字'); return; }
  if (!contact) { showToast('请填写联系方式'); return; }

  const db = loadDB();
  const existing = db.guests.findIndex(g => g.name === name);
  const entry = { name, count: Number(count), contact, msg, time: new Date().toLocaleString('zh-CN') };
  if (existing >= 0) db.guests[existing] = entry;
  else db.guests.push(entry);
  saveDB(db);

  document.getElementById('rsvpForm').style.display = 'none';
  document.getElementById('rsvpDone').style.display = 'block';
  renderGuests();
  showToast('报名成功！期待与你相见');
}
function editRSVP() {
  document.getElementById('rsvpForm').style.display = 'block';
  document.getElementById('rsvpDone').style.display = 'none';
}

// ===== Guest list =====
function renderGuests() {
  const db = loadDB();
  const list = document.getElementById('guestList');
  const empty = document.getElementById('guestEmpty');
  const num = document.getElementById('guestCountNum');
  const guests = db.guests;
  num.textContent = guests.length;
  if (!guests.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = guests.map(g => {
    const initial = g.name.charAt(0);
    const mood = g.mood || '';
    return `<div class="guest-item">
      <div class="guest-avatar">${initial}</div>
      <div class="guest-info">
        <div class="guest-name">${esc(g.name)} ${mood}</div>
        <div class="guest-meta">${g.count}人 · ${esc(g.contact)}${g.msg ? ' · ' + esc(g.msg) : ''}</div>
      </div>
      <span class="guest-status status-yes">确认</span>
    </div>`;
  }).join('');
}

// ===== Food vote =====
function renderFood() {
  const db = loadDB();
  const grid = document.getElementById('foodGrid');
  const maxVotes = Math.max(...db.foods.map(f => f.votes), 1);
  grid.innerHTML = db.foods.map(f => {
    const pct = Math.round((f.votes / maxVotes) * 100);
    return `<div class="food-card" data-id="${f.id}" onclick="voteFood('${f.id}')">
      <span class="food-emoji">${f.emoji}</span>
      <div class="food-name">${f.name}</div>
      <div class="food-votes">${f.votes} 票</div>
      <div class="vote-bar"><div class="vote-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
function voteFood(id) {
  const db = loadDB();
  const food = db.foods.find(f => f.id === id);
  if (food) { food.votes++; saveDB(db); renderFood(); showToast('投票成功！'); }
}

// ===== Chat =====
function renderChat() {
  const db = loadDB();
  const box = document.getElementById('chatBox');
  box.innerHTML = db.chat.map(c => `<div class="chat-msg">
    <div class="chat-avatar" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-light));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0;">${c.name.charAt(0)}</div>
    <div class="chat-bubble">
      <div class="chat-name">${esc(c.name)}</div>
      <div class="chat-text">${esc(c.text)}</div>
      <div class="chat-time">${esc(c.time)}</div>
    </div>
  </div>`).join('');
  box.scrollTop = box.scrollHeight;
}
function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  const name = document.getElementById('guestName').value.trim() || '匿名好友';
  const db = loadDB();
  db.chat.push({ name, text, time: '刚刚' });
  saveDB(db);
  input.value = '';
  renderChat();
}

// ===== Check-in =====
function doCheckin() {
  const name = document.getElementById('guestName').value.trim() || '匿名好友';
  const db = loadDB();
  if (db.checkins.find(c => c.name === name)) {
    showToast('你已经打过卡啦！');
    return;
  }
  const now = new Date();
  db.checkins.push({ name, time: now.toLocaleString('zh-CN') });
  saveDB(db);
  const result = document.getElementById('checkinResult');
  result.style.display = 'block';
  result.innerHTML = `<div style="font-size:32px; margin-bottom:8px;">🎊</div>
    <div><strong>${esc(name)}</strong> 已到场 ${selectedMood}</div>
    <div style="font-size:12px; color:var(--ink-soft); margin-top:4px;">${now.toLocaleString('zh-CN')}</div>
    <div style="margin-top:8px; font-size:13px;">今日到场 <strong>${db.checkins.length}</strong> 人</div>`;
  document.getElementById('checkinBtn').disabled = true;
  document.getElementById('checkinBtn').textContent = '已打卡 ✓';
  showToast('打卡成功！欢迎入座');
}

// ===== Bullet screen =====
const db0 = loadDB();
let bulletIdx = 0;
function fireBullet() {
  const container = document.getElementById('bulletContainer');
  const msgs = db0.bulletMsgs;
  const text = msgs[bulletIdx % msgs.length];
  bulletIdx++;
  const el = document.createElement('div');
  el.className = 'bullet';
  el.textContent = text;
  el.style.top = (Math.random() * 70 + 5) + '%';
  el.style.animationDuration = (6 + Math.random() * 4) + 's';
  container.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
// fire initial burst
for (let i = 0; i < 3; i++) setTimeout(fireBullet, i * 800);
setInterval(fireBullet, 4000);

// ===== Scroll reveal =====
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.slide-in').forEach(el => observer.observe(el));

// ===== Init =====
renderGuests();
renderFood();
renderChat();

// ===== Utils =====
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== Confetti =====
function fireConfetti() {
  const colors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF', '#C76B8A', '#C9A96E'];
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-10px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      piece.style.animationDuration = (2 + Math.random() * 2) + 's';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }, i * 30);
  }
}

// ===== Easter egg - title clicks =====
let titleClickCount = 0;
let titleClickTimer = null;
function titleClick() {
  titleClickCount++;
  clearTimeout(titleClickTimer);
  titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 2000);
  if (titleClickCount >= 5) {
    titleClickCount = 0;
    triggerRainbow();
    fireConfetti();
    showToast('🎉 发现彩蛋！祝你今天开心！');
    // Spawn extra petals
    for (let i = 0; i < 12; i++) {
      setTimeout(() => {
        const petal = document.createElement('div');
        petal.style.cssText = `position:fixed; top:-20px; left:${Math.random()*100}vw; pointer-events:none; z-index:101; font-size:${20+Math.random()*20}px; animation: fall ${5+Math.random()*3}s linear forwards;`;
        petal.textContent = ['🌸', '💕', '✨', '🌹', '💖', '🍀'][Math.floor(Math.random()*6)];
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 8000);
      }, i * 100);
    }
  }
}

// ===== Rainbow =====
function triggerRainbow() {
  const r = document.getElementById('rainbow');
  r.classList.add('show');
  setTimeout(() => r.classList.remove('show'), 2500);
}

// ===== Mood selector =====
let selectedMood = '😊';
function selectMood(el) {
  document.querySelectorAll('.mood-item').forEach(m => m.classList.remove('selected'));
  el.classList.add('selected');
  selectedMood = el.dataset.mood;
}

// ===== Lucky wheel =====
const wheelFoods = ['🍖 烤肉', '🍣 日料', '🍲 火锅', '🥗 轻食', '🍝 意面', '🦐 海鲜'];
let isSpinning = false;
function spinWheel() {
  if (isSpinning) return;
  isSpinning = true;
  const wheel = document.getElementById('luckyWheel');
  const result = document.getElementById('wheelResult');
  result.style.display = 'none';
  const spins = 5 + Math.floor(Math.random() * 3);
  const extraDeg = Math.floor(Math.random() * 360);
  wheel.style.transform = `rotate(${spins * 360 + extraDeg}deg)`;
  setTimeout(() => {
    const idx = Math.floor(((360 - (extraDeg % 360)) / 60)) % 6;
    result.textContent = `✨ 今晚吃 ${wheelFoods[idx]}！`;
    result.style.display = 'block';
    isSpinning = false;
    fireConfetti();
  }, 4200);
}

// ===== Update RSVP confetti =====
const origSubmit = submitRSVP;
submitRSVP = function() {
  const name = document.getElementById('guestName').value.trim();
  const count = document.getElementById('guestCount').value;
  const contact = document.getElementById('guestContact').value.trim();
  const msg = document.getElementById('guestMsg').value.trim();
  if (!name) { showToast('请填写你的名字'); return; }
  if (!contact) { showToast('请填写联系方式'); return; }
  const db = loadDB();
  const existing = db.guests.findIndex(g => g.name === name);
  const entry = { name, count: Number(count), contact, msg, mood: selectedMood, time: new Date().toLocaleString('zh-CN') };
  if (existing >= 0) db.guests[existing] = entry;
  else db.guests.push(entry);
  saveDB(db);
  document.getElementById('rsvpForm').style.display = 'none';
  document.getElementById('rsvpDone').style.display = 'block';
  renderGuests();
  showToast('报名成功！期待与你相见');
  fireConfetti();
};

  { id: 33451932, name: '告白气球 - 周杰伦', icon: '🎈' },
];

function toggleMusicPanel() {
  musicPanel.classList.toggle('show');
}

function selectSong(idx) {
  currentTrackIdx = idx;
  const song = songList[idx];
  musicFrame.src = `https://music.163.com/outchain/player?type=2&id=${song.id}&auto=0&height=66`;
  renderMusicPlaylist();
}

function renderMusicPlaylist() {
  const playlist = document.getElementById('musicPlaylist');
  playlist.innerHTML = songList.map((song, i) => {
    const isActive = i === currentTrackIdx;
    return `<div class="music-playlist-item${isActive ? ' active' : ''}" onclick="selectSong(${i})">
      <span class="item-icon">${song.icon}</span>
      <span class="item-name">${song.name}</span>
    </div>`;
  }).join('');
}

renderMusicPlaylist();
